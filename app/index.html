<style>
/* ===== DESIGN TOKENS ===== */
:root {
  --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
  --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
  --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
  --text-lg:   clamp(1.125rem, 1rem    + 0.75vw, 1.5rem);
  --text-xl:   clamp(1.5rem,   1.2rem  + 1.25vw, 2.25rem);
  --text-2xl:  clamp(2rem,     1.2rem  + 2.5vw,  3.5rem);

  --space-1:  0.25rem;
  --space-2:  0.5rem;
  --space-3:  0.75rem;
  --space-4:  1rem;
  --space-5:  1.25rem;
  --space-6:  1.5rem;
  --space-8:  2rem;
  --space-10: 2.5rem;

  --radius-sm: 0.375rem;
  --radius-md: 0.5rem;
  --radius-lg: 0.75rem;
  --radius-xl: 1rem;
  --radius-full: 9999px;
  --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);

  --font-body: 'Space Grotesk', system-ui, sans-serif;
  --font-mono: 'Space Mono', monospace;
}

/* Palette inspirée de l'archéologie : terre, os, obsidienne */
:root, [data-theme="dark"] {
  --color-bg:             #0e0d0b;
  --color-surface:        #161410;
  --color-surface-2:      #1e1b16;
  --color-surface-offset: #252018;
  --color-divider:        #2e2820;
  --color-border:         #3a3228;
  --color-text:           #e8e0d0;
  --color-text-muted:     #9a8f7a;
  --color-text-faint:     #5a5248;
  --color-text-inverse:   #0e0d0b;

  /* Amber / ocre = accent principal */
  --color-primary:        #d4820a;
  --color-primary-hover:  #f09a1a;
  --color-primary-active: #ffb030;
  --color-primary-highlight: #3a2a0a;

  /* Vert ancien */
  --color-success:        #5e8c4a;
  --color-blue:           #4a7a9b;
  --color-purple:         #7a5e9b;
  --color-error:          #a84040;

  --shadow-sm: 0 1px 3px rgba(0,0,0,0.4);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.5);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.6);
}

[data-theme="light"] {
  --color-bg:             #f0ebe0;
  --color-surface:        #faf6ee;
  --color-surface-2:      #fff;
  --color-surface-offset: #e6dfd0;
  --color-divider:        #c8bfa8;
  --color-border:         #b0a488;
  --color-text:           #1a1208;
  --color-text-muted:     #4a3e2c;
  --color-text-faint:     #7a6e58;
  --color-text-inverse:   #f0ebe0;

  /* Primary darker for WCAG AA on light bg */
  --color-primary:        #8a4f00;
  --color-primary-hover:  #6a3800;
  --color-primary-active: #4e2a00;
  --color-primary-highlight: #eed8a0;

  --color-success:        #3a6020;
  --color-blue:           #1a4e7a;
  --color-purple:         #4a2e7a;
  --color-error:          #7a1a1a;

  --shadow-sm: 0 1px 4px rgba(0,0,0,0.18);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.2);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.24);
}

/* ===== BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font-body);
  font-size: var(--text-base);
  color: var(--color-text);
  background: var(--color-bg);
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
a { color: var(--color-primary); }

/* ===== LAYOUT ===== */
#app {
  display: grid;
  grid-template-rows: auto 1fr auto;
  height: 100dvh;
  overflow: hidden;
}

/* ===== HEADER ===== */
#header {
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-divider);
  padding: var(--space-3) var(--space-6);
  display: flex;
  align-items: center;
  gap: var(--space-4);
  z-index: 1000;
  flex-wrap: wrap;
}

.logo {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  flex-shrink: 0;
}
.logo svg { color: var(--color-primary); }
.logo-text {
  font-size: var(--text-lg);
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1;
}
.logo-text span { color: var(--color-primary); }
.logo-sub {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  font-family: var(--font-mono);
}

.header-controls {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  margin-left: auto;
}

.btn-icon {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-md);
  color: var(--color-text-muted);
  transition: all var(--transition-interactive);
}
.btn-icon:hover {
  background: var(--color-surface-offset);
  color: var(--color-text);
}

/* ===== MAIN CONTENT ===== */
#main {
  display: grid;
  grid-template-columns: 1fr 380px;
  overflow: hidden;
  position: relative;
}

/* ===== MAP ===== */
#map {
  width: 100%;
  height: 100%;
  z-index: 1;
  background: #0a0e18;
}

/* Leaflet overrides */
.leaflet-container { font-family: var(--font-body); background: #0a0e18; }
.leaflet-control-zoom { display: none; }
.leaflet-attribution-flag { display: none !important; }
.leaflet-control-attribution { 
  background: rgba(14,13,11,0.8) !important; 
  color: var(--color-text-faint) !important;
  font-size: 10px;
}
.leaflet-control-attribution a { color: var(--color-text-muted) !important; }
/* Light mode: tooltip popups need dark text */
[data-theme="light"] .leaflet-tooltip {
  background: rgba(250,246,238,0.96);
  color: #1a1208;
  border-color: #b0a488;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
[data-theme="light"] .leaflet-tooltip-custom {
  color: #1a1208;
}

/* Custom markers */
.hominine-marker {
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  border: 2px solid;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 0 0 0 transparent;
  font-size: 16px;
  text-align: center;
  line-height: 1;
}
.hominine-marker:hover {
  transform: scale(1.2);
  z-index: 999 !important;
}
.hominine-marker.active {
  box-shadow: 0 0 0 4px var(--color-primary);
  z-index: 999 !important;
}

/* Migration arrows */
.migration-path {
  stroke-dasharray: 8 4;
  animation: dashMove 1.5s linear infinite;
}
@keyframes dashMove {
  to { stroke-dashoffset: -24; }
}

/* ===== SIDE PANEL ===== */
#side-panel {
  background: var(--color-surface);
  border-left: 1px solid var(--color-divider);
  overflow-y: auto;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
}

.side-panel-header {
  padding: var(--space-5) var(--space-6) var(--space-4);
  border-bottom: 1px solid var(--color-divider);
  position: sticky;
  top: 0;
  background: var(--color-surface);
  z-index: 10;
}

.period-label {
  font-size: var(--text-xs);
  font-family: var(--font-mono);
  color: var(--color-primary);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: var(--space-1);
}

.species-name {
  font-size: var(--text-lg);
  font-weight: 700;
  font-style: italic;
  line-height: 1.2;
  margin-bottom: var(--space-1);
}
.species-name-common {
  font-size: var(--text-sm);
  color: var(--color-text-muted);
  font-style: normal;
}

/* Pigmentation showcase */
.pigmentation-section {
  padding: var(--space-5) var(--space-6);
  border-bottom: 1px solid var(--color-divider);
}
.pigmentation-title {
  font-size: var(--text-xs);
  font-family: var(--font-mono);
  color: var(--color-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: var(--space-4);
}

.pigmentation-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: var(--space-3);
  margin-bottom: var(--space-4);
}

.pig-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-2);
}
.pig-label {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  text-align: center;
}
.pig-swatch {
  width: 56px;
  height: 56px;
  border-radius: var(--radius-full);
  border: 2px solid var(--color-border);
  position: relative;
  flex-shrink: 0;
}
/* Split swatch for variants */
.pig-swatch.split {
  background: conic-gradient(var(--c1) 0% 60%, var(--c2) 60% 100%);
}
.pig-desc {
  font-size: var(--text-xs);
  color: var(--color-text);
  text-align: center;
  font-weight: 500;
  line-height: 1.3;
}

/* Certainty badge */
.certainty-badge {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  font-size: var(--text-xs);
  padding: 3px var(--space-2);
  border-radius: var(--radius-full);
  font-family: var(--font-mono);
}
.certainty-badge.dna-direct { background: rgba(94,140,74,0.15); color: #4a8a34; border: 1px solid rgba(94,140,74,0.4); }
.certainty-badge.genetic { background: rgba(74,122,155,0.15); color: #1a5e90; border: 1px solid rgba(74,122,155,0.4); }
.certainty-badge.inference { background: rgba(212,130,10,0.15); color: var(--color-primary); border: 1px solid rgba(212,130,10,0.4); }
.certainty-badge.debate { background: rgba(168,64,64,0.15); color: #902020; border: 1px solid rgba(168,64,64,0.4); }
/* Light mode overrides for better contrast */
[data-theme="light"] .certainty-badge.dna-direct { color: #2a6018; background: rgba(94,140,74,0.2); }
[data-theme="light"] .certainty-badge.genetic { color: #0e3e6a; background: rgba(74,122,155,0.2); }
[data-theme="light"] .certainty-badge.inference { color: #6a3800; background: rgba(212,130,10,0.25); }
[data-theme="light"] .certainty-badge.debate { color: #6a0e0e; background: rgba(168,64,64,0.2); }

/* Biometrics */
.biometrics-section {
  padding: var(--space-5) var(--space-6);
  border-bottom: 1px solid var(--color-divider);
}
.bio-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-3);
  margin-top: var(--space-3);
}
.bio-item {
  background: var(--color-surface-offset);
  border-radius: var(--radius-md);
  padding: var(--space-3);
}
.bio-item-label {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  margin-bottom: var(--space-1);
}
.bio-item-value {
  font-size: var(--text-sm);
  font-weight: 600;
  font-family: var(--font-mono);
  color: var(--color-primary);
}

/* Tools & technology */
.tools-section {
  padding: var(--space-5) var(--space-6);
  border-bottom: 1px solid var(--color-divider);
}
.tool-tag {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  background: var(--color-surface-offset);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  padding: var(--space-1) var(--space-3);
  font-size: var(--text-xs);
  margin: var(--space-1);
}

/* Debate section */
.debate-section {
  padding: var(--space-4) var(--space-6);
  border-bottom: 1px solid var(--color-divider);
}
.debate-item {
  background: rgba(168,64,64,0.08);
  border-left: 3px solid #a84040;
  border-radius: 0 var(--radius-md) var(--radius-md) 0;
  padding: var(--space-3) var(--space-4);
  margin-top: var(--space-2);
  font-size: var(--text-sm);
  color: var(--color-text-muted);
  line-height: 1.5;
}

/* Empty state */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: var(--space-8);
  text-align: center;
  gap: var(--space-4);
}
.empty-state-icon { font-size: 48px; opacity: 0.3; }
.empty-state-title { font-size: var(--text-lg); font-weight: 600; }
.empty-state-desc { font-size: var(--text-sm); color: var(--color-text-muted); max-width: 28ch; line-height: 1.6; }

/* ===== TIMELINE ===== */
#timeline {
  background: var(--color-surface);
  border-top: 1px solid var(--color-divider);
  padding: var(--space-3) var(--space-5) var(--space-3);
  z-index: 100;
  overflow: hidden;
}

.timeline-header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: var(--space-2);
}
.timeline-current-label {
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  color: var(--color-primary);
  font-weight: 700;
}
.timeline-hint {
  font-size: var(--text-xs);
  color: var(--color-text-faint);
}

/* === MAIN SPECIES TRACK === */
.timeline-species-track {
  position: relative;
  height: 64px;
  margin-bottom: var(--space-1);
}
/* The rail underneath */
.timeline-rail {
  position: absolute;
  left: 0; right: 0;
  height: 3px;
  background: var(--color-border);
  border-radius: 2px;
  top: 32px;
}
/* Each species gets its own horizontal lane */
.species-lane {
  position: absolute;
  height: 10px;
  border-radius: 5px;
  cursor: pointer;
  opacity: 0.85;
  transition: opacity 0.15s, filter 0.15s;
  touch-action: manipulation;
}
.species-lane:hover, .species-lane.active {
  opacity: 1;
  filter: brightness(1.3);
  z-index: 5;
}
/* Lane label shown on hover */
.species-lane-label {
  position: absolute;
  white-space: nowrap;
  font-size: 8px;
  font-family: var(--font-mono);
  color: var(--color-text-faint);
  top: -12px;
  left: 2px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
}
.species-lane:hover .species-lane-label { opacity: 1; }

/* === NEEDLE wrapper — spans ALL rows of the footer === */
/* This is placed in a separate absolute container that covers
   species-track + ticks + skin-band + events-band */
.timeline-full-needle {
  position: absolute;
  top: 0; bottom: 0;
  width: 2px;
  background: var(--color-primary);
  opacity: 0.9;
  pointer-events: none;
  z-index: 30;
}
/* The round handle at the TOP of the needle */
.timeline-needle-handle {
  position: absolute;
  top: -14px;
  left: 50%;
  transform: translateX(-50%);
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: var(--color-primary);
  border: 3px solid var(--color-bg);
  box-shadow: 0 0 0 2px var(--color-primary), 0 2px 8px rgba(0,0,0,0.5);
  cursor: grab;
  pointer-events: all;
  z-index: 31;
  touch-action: none;
  transition: box-shadow 0.15s;
}
.timeline-needle-handle:active { cursor: grabbing; }
.timeline-needle-handle:hover {
  box-shadow: 0 0 0 4px var(--color-primary), 0 0 16px rgba(212,130,10,0.5);
}
/* Glow line effect */
.timeline-full-needle::after {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 6px;
  height: 100%;
  background: var(--color-primary);
  filter: blur(4px);
  opacity: 0.3;
  pointer-events: none;
}

/* Old needle (keep for compat) */
.timeline-needle {
  display: none;
}
.timeline-needle-handle-old {
  display: none;
}

/* === PLAY BUTTON === */
#play-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
  background: var(--color-primary-highlight);
  border: 1.5px solid var(--color-primary);
  border-radius: var(--radius-full);
  padding: 5px 14px;
  font-size: var(--text-xs);
  font-family: var(--font-mono);
  color: var(--color-primary);
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
  flex-shrink: 0;
}
#play-btn:hover {
  background: var(--color-primary);
  color: var(--color-text-inverse);
}
#play-btn.playing {
  background: var(--color-primary);
  color: var(--color-text-inverse);
  border-color: var(--color-primary-active);
}
#play-btn svg {
  flex-shrink: 0;
  transition: all 0.18s;
}

/* Speed select */
#play-speed {
  background: var(--color-surface-offset);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  color: var(--color-text-muted);
  font-size: var(--text-xs);
  font-family: var(--font-mono);
  padding: 3px 6px;
  cursor: pointer;
}

/* Animated migration arrow */
@keyframes migrationPulse {
  0%   { stroke-dashoffset: 0; opacity: 0.9; }
  100% { stroke-dashoffset: -40; opacity: 0.6; }
}
.migration-animated {
  animation: migrationPulse 0.6s linear infinite;
  stroke-dasharray: 10 6;
}

/* === DATE TICKS === */
.timeline-ticks-row {
  position: relative;
  height: 18px;
  margin-bottom: 2px;
}
.tl-tick {
  position: absolute;
  top: 0;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
}
.tl-tick-line {
  width: 1px;
  height: 6px;
  background: var(--color-border);
}
.tl-tick-text {
  font-size: 8px;
  font-family: var(--font-mono);
  color: var(--color-text-faint);
  white-space: nowrap;
}

/* === SKIN BAND === */
.timeline-band {
  position: relative;
  height: 20px;
  margin-bottom: 3px;
  display: flex;
  align-items: center;
}
.timeline-band-label {
  font-size: 8px;
  font-family: var(--font-mono);
  color: var(--color-text-faint);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  width: 54px;
  flex-shrink: 0;
  padding-right: 4px;
  text-align: right;
  line-height: 1.2;
}
.timeline-band-track {
  position: relative;
  flex: 1;
  height: 100%;
}
.band-segment {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  height: 16px;
  border-radius: 3px;
  cursor: default;
}
.band-segment:hover::after {
  content: attr(data-tip);
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--color-surface-offset);
  border: 1px solid var(--color-border);
  border-radius: 4px;
  padding: 4px 8px;
  font-size: 10px;
  white-space: nowrap;
  color: var(--color-text);
  z-index: 100;
  pointer-events: none;
}

/* === EVENTS BAND (tools, fire, art, etc.) === */
.events-band {
  position: relative;
  height: 22px;
  display: flex;
  align-items: center;
}
.events-band-track {
  position: relative;
  flex: 1;
  height: 100%;
}
.event-marker {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  font-size: 13px;
  line-height: 1;
  cursor: pointer;
  z-index: 5;
  transition: transform 0.15s;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.6));
}
.event-marker:hover {
  transform: translate(-50%, -50%) scale(1.4);
  z-index: 10;
}
.event-marker:hover::after {
  content: attr(data-tip);
  position: absolute;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--color-surface-offset);
  border: 1px solid var(--color-border);
  border-radius: 4px;
  padding: 4px 8px;
  font-size: 10px;
  white-space: nowrap;
  color: var(--color-text);
  z-index: 100;
  pointer-events: none;
  max-width: 220px;
  text-wrap: wrap;
}

/* Touch target enlargement on mobile */
@media (max-width: 900px) {
  .timeline-needle-handle { width: 28px; height: 28px; }
  .event-marker { font-size: 16px; }
  .tl-tick-text { display: none; }
  #timeline { padding: var(--space-2) var(--space-3); }
}

/* ===== LEGEND ===== */
.map-legend {
  position: absolute;
  bottom: var(--space-4);
  left: var(--space-4);
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-3) var(--space-4);
  z-index: 500;
  min-width: 180px;
  box-shadow: var(--shadow-md);
}
.map-legend-title {
  font-size: var(--text-xs);
  font-family: var(--font-mono);
  color: var(--color-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: var(--space-2);
}
.map-legend-item {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  margin-bottom: var(--space-1);
  font-size: var(--text-xs);
}
.legend-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ===== TOOLTIP ===== */
.map-tooltip {
  position: absolute;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: var(--space-3) var(--space-4);
  z-index: 1000;
  pointer-events: none;
  font-size: var(--text-sm);
  box-shadow: var(--shadow-md);
  max-width: 200px;
  transition: opacity 0.15s;
}

/* ===== HUMAN FIGURE ===== */
.human-figure-container {
  display: flex;
  justify-content: center;
  padding: var(--space-5) var(--space-6);
  border-bottom: 1px solid var(--color-divider);
}

.human-figure-svg {
  width: 120px;
  height: 160px;
}

/* Scrollbar */
#side-panel::-webkit-scrollbar { width: 4px; }
#side-panel::-webkit-scrollbar-track { background: transparent; }
#side-panel::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 2px; }

/* Layer toggles */
.layer-toggle-group {
  position: absolute;
  top: var(--space-4);
  right: var(--space-4);
  z-index: 500;
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
}
.layer-btn {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: var(--space-2) var(--space-3);
  font-size: var(--text-xs);
  font-family: var(--font-mono);
  display: flex;
  align-items: center;
  gap: var(--space-2);
  box-shadow: var(--shadow-sm);
  transition: all var(--transition-interactive);
  cursor: pointer;
  white-space: nowrap;
}
.layer-btn:hover { background: var(--color-surface-offset); }
.layer-btn.active { 
  background: var(--color-primary-highlight); 
  border-color: var(--color-primary);
  color: var(--color-primary);
}
.layer-btn-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}

/* Map container relative position */
.map-container {
  position: relative;
  overflow: hidden;
}

/* Section title shared */
.section-title {
  font-size: var(--text-xs);
  font-family: var(--font-mono);
  color: var(--color-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: var(--space-3);
}

/* Animation fade */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.animate-in { animation: fadeIn 0.3s ease forwards; }

/* Responsive */
@media (max-width: 900px) {
  #main { grid-template-columns: 1fr; }
  #side-panel {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 45vh;
    z-index: 200;
    border-top: 1px solid var(--color-divider);
    border-left: none;
  }
}

/* === PLAY BUTTON — prominent top-left of footer === */
.timeline-header-row {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  margin-bottom: var(--space-2);
  flex-wrap: wrap;
}
/* Play first, then time label */
#play-btn {
  order: -1;
  font-size: var(--text-sm);
  padding: 7px 18px;
  border-radius: var(--radius-full);
  font-weight: 600;
}
/* Pulse highlight when waiting for first interaction */
@keyframes playPulse {
  0%   { box-shadow: 0 0 0 0 rgba(212,130,10,0.7); }
  60%  { box-shadow: 0 0 0 10px rgba(212,130,10,0); }
  100% { box-shadow: 0 0 0 0 rgba(212,130,10,0); }
}
#play-btn.pulse {
  animation: playPulse 1.2s ease-out infinite;
}

/* === FUR TEXTURE on skin band === */
/* SVG data URI for hair strokes, repeated as pattern */
.band-segment.fur {
  background-image: repeating-linear-gradient(
    90deg,
    rgba(0,0,0,0) 0px,
    rgba(0,0,0,0) 3px,
    rgba(255,255,255,0.18) 3px,
    rgba(255,255,255,0.18) 4px
  ),
  repeating-linear-gradient(
    175deg,
    rgba(0,0,0,0) 0px,
    rgba(0,0,0,0) 5px,
    rgba(0,0,0,0.25) 5px,
    rgba(0,0,0,0.25) 6px
  );
}
/* Transition period — dotted stipple for partial fur loss */
.band-segment.partial-fur {
  background-image: radial-gradient(
    circle,
    rgba(0,0,0,0.3) 1px,
    rgba(0,0,0,0) 2px
  );
  background-size: 5px 5px;
}

/* === WELCOME HINT OVERLAY === */
#welcome-hint {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(14,13,11,0.88);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-3) var(--space-5);
  font-size: var(--text-sm);
  color: #e8e0d0;
  pointer-events: none;
  z-index: 600;
  white-space: nowrap;
  backdrop-filter: blur(6px);
  transition: opacity 0.6s;
}
#welcome-hint.hidden { opacity: 0; }
[data-theme="light"] #welcome-hint {
  background: rgba(26,18,8,0.82);
  color: #f0ebe0;
  border-color: rgba(0,0,0,0.3);
}

/* Migration arrow marker */
.mig-arrow-head {
  pointer-events: none;
}

/* Speed selector — hidden, speed is fixed */
#play-speed { display: none; }
#tl-hint-desktop { display: none; }

/* ===== LANGUAGE SELECTOR ===== */
.lang-selector {
  display: flex;
  align-items: center;
  gap: var(--space-1);
  background: var(--color-surface-offset);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 4px var(--space-2);
  transition: border-color var(--transition-interactive);
}
.lang-selector:focus-within {
  border-color: var(--color-primary);
  outline: none;
}
.lang-globe {
  font-size: 14px;
  line-height: 1;
  flex-shrink: 0;
}
#lang-select {
  background: none;
  border: none;
  outline: none;
  font-family: var(--font-body);
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  cursor: pointer;
  padding: 0;
  max-width: 90px;
  appearance: none;
  -webkit-appearance: none;
}
#lang-select:hover { color: var(--color-text); }
[data-theme="light"] #lang-select { color: var(--color-text-muted); }

</style>

// =====================================================================
// TIMELINE SETUP
// =====================================================================
const TIMELINE_MIN = -4200000;
const TIMELINE_MAX = -1500;

// Log scale mapping for timeline
function linearToTime(t) {
  // t is 0..1
  const logMin = Math.log10(Math.abs(TIMELINE_MIN));
  const logMax = Math.log10(Math.abs(TIMELINE_MAX));
  const logVal = logMin + (logMax - logMin) * t;
  return -Math.pow(10, logVal);
}
function timeToLinear(time) {
  const logMin = Math.log10(Math.abs(TIMELINE_MIN));
  const logMax = Math.log10(Math.abs(TIMELINE_MAX));
  const logVal = Math.log10(Math.abs(time));
  return (logVal - logMin) / (logMax - logMin);
}

function formatTime(t) {
  const abs = Math.abs(t);
  if (abs >= 1000000) return `— ${(abs/1000000).toFixed(1).replace('.', ',')} Ma`;
  if (abs >= 1000) return `— ${Math.round(abs/1000)} 000 ans`;
  return `— ${Math.round(abs)} ans`;
}

let currentTime = -4100000;
let selectedSpecies = null;
let layerStates = { sites: true, migrations: true, range: true };
let mapMarkers = {};
let mapPolygons = {};
let mapArrows = {};
let leafletMap = null;
let markersLayer = null;
let migrationsLayer = null;
let rangesLayer = null;

// =====================================================================
// MAP INITIALIZATION
// =====================================================================
function initMap() {
  leafletMap = L.map('map', {
    center: [20, 30],
    zoom: 2,
    minZoom: 1,
    maxZoom: 7,
    zoomControl: false,
    attributionControl: true,
    worldCopyJump: false,
  });

  // Dark tile layer
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 20,
  }).addTo(leafletMap);

  // Light label overlay
  const labelLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd',
    opacity: 0.4,
    maxZoom: 20,
    pane: 'overlayPane',
  }).addTo(leafletMap);

  markersLayer = L.layerGroup().addTo(leafletMap);
  migrationsLayer = L.layerGroup().addTo(leafletMap);
  rangesLayer = L.layerGroup().addTo(leafletMap);
}

// =====================================================================
// UPDATE MAP — show species visible at currentTime
// =====================================================================
function getVisibleSpecies() {
  return SPECIES_DATA.filter(s => s.start <= currentTime && s.end >= currentTime);
}

function updateMap() {
  const visible = getVisibleSpecies();

  // Clear layers
  markersLayer.clearLayers();
  migrationsLayer.clearLayers();
  rangesLayer.clearLayers();

  // Update legend
  const legendContent = document.getElementById('legend-content');
  legendContent.innerHTML = visible.length === 0
    ? '<div style="font-size:var(--text-xs);color:var(--color-text-faint)">Aucune espèce à cette période</div>'
    : visible.map(s => `
      <div class="map-legend-item">
        <div class="legend-dot" style="background:${s.color}"></div>
        <span style="color:${s.color};font-style:italic">${s.name.replace('Homo sapiens — ', 'H.s. ')}</span>
      </div>
    `).join('');

  visible.forEach(species => {
    // --- RANGES ---
    if (layerStates.range) {
      species.regions.forEach(region => {
        const circle = L.circle([region.lat, region.lng], {
          radius: region.radius * 0.5,
          color: species.color,
          fillColor: species.color,
          fillOpacity: 0.07,
          weight: 1,
          opacity: 0.3,
          dashArray: '4 4',
        });
        circle.bindTooltip(`<strong>${species.name}</strong><br>${region.note}`, {
          permanent: false, direction: 'top', className: 'leaflet-tooltip-custom'
        });
        rangesLayer.addLayer(circle);
      });
    }

    // --- SITES (MARKERS) ---
    if (layerStates.sites) {
      species.sites.forEach(site => {
        const isSelected = selectedSpecies && selectedSpecies.id === species.id;
        const size = isSelected ? 18 : 14;
        const icon = L.divIcon({
          className: '',
          html: `<div class="hominine-marker ${isSelected ? 'active' : ''}" style="
            width:${size}px; height:${size}px;
            background:${species.color}22;
            border-color:${species.color};
            color:${species.color};
          " title="${site.name}"></div>`,
          iconSize: [size, size],
          iconAnchor: [size/2, size/2],
        });

        const marker = L.marker([site.lat, site.lng], { icon });
        marker.bindTooltip(`
          <div style="font-size:11px">
            <strong style="color:${species.color}">${site.name}</strong><br>
            <em style="color:#9a8f7a">${species.name}</em><br>
            ${site.note}
          </div>
        `, { direction: 'top', offset: [0, -8] });

        marker.on('click', () => {
          selectSpecies(species);
        });
        markersLayer.addLayer(marker);
      });
    }

    // --- MIGRATIONS ---
    if (layerStates.migrations) {
      species.migrations.forEach(mig => {
        const line = L.polyline([mig.from, mig.to], {
          color: species.color,
          weight: 2,
          opacity: 0.6,
          dashArray: '8 4',
          className: 'migration-path',
        });
        line.bindTooltip(`<span style="color:${species.color}">${mig.label}</span>`, { direction: 'center' });
        migrationsLayer.addLayer(line);

        // Arrow at endpoint
        const arrow = L.circleMarker(mig.to, {
          radius: 5,
          color: species.color,
          fillColor: species.color,
          fillOpacity: 0.8,
          weight: 1,
        });
        migrationsLayer.addLayer(arrow);
      });
    }
  });

  // --- EVENTS ---
  updateEvents();

  // --- MIGRATION ARROWS (always visible with direction, animated during play) ---
  if (typeof updateAnimatedMigrations === 'function') updateAnimatedMigrations();
}

function updateEvents() {
  if (!eventsLayer) return;
  eventsLayer.clearLayers();
  if (!showEvents) return;

  const visible = EVENTS_DATA.filter(ev => ev.time >= TIMELINE_MIN && ev.time <= currentTime * 1.001);

  visible.forEach(ev => {
    const icon = L.divIcon({
      className: '',
      html: `<div style="font-size: 18px; line-height: 1; filter: drop-shadow(0 1px 3px rgba(0,0,0,0.8)); cursor: pointer;" title="${ev.label}">${ev.icon}</div>`,
      iconSize: [24, 24],
      iconAnchor: [12, 12],
    });
    const marker = L.marker([ev.lat, ev.lng], { icon, zIndexOffset: 200 });
    marker.bindTooltip(`
      <div style="font-size:11px;max-width:220px">
        <strong style="color:${ev.color}">${ev.label}</strong><br>
        <em style="color:#9a8f7a">${getCategoryLabel(ev.category)}</em><br>
        ${ev.desc}
        ${ev.source ? '<br><span style="color:#5a5248;font-style:italic">' + ev.source + '</span>' : ''}
      </div>
    `, { direction: 'top', offset: [0, -10] });
    eventsLayer.addLayer(marker);
  });
}

// Assign vertical lane index per species to avoid overlap
// Species are grouped by era and spread across 5 vertical positions (0..4)
const LANE_ASSIGNMENTS = {
  'afarensis':           0,
  'habilis':             1,
  'erectus':             2,
  'heidelbergensis':     3,
  'neanderthal':         1,
  'denisovan':           2,
  'sapiens-africa':      3,
  'sapiens-levant':      4,
  'sapiens-upper-paleo': 3,
  'sapiens-mesolithic':  3,
  'sapiens-neolithic':   3,
  'sapiens-bronze':      3,
};
const LANE_COUNT = 5;
const LANE_H = 10; // px per lane bar
const SPECIES_TRACK_H = 64; // total track height

function getLaneTop(laneIndex) {
  // Distribute lanes evenly within the track, leaving room for needle
  const usable = SPECIES_TRACK_H - LANE_H;
  return Math.round((laneIndex / (LANE_COUNT - 1)) * usable);
}

function initTimeline() {
  const track = document.getElementById('timeline-species-track');
  const lanesEl = document.getElementById('timeline-lanes');
  const ticksRow = document.getElementById('timeline-ticks-row');

  // --- Species lanes ---
  SPECIES_DATA.forEach(species => {
    const x1pct = timeToLinear(species.start) * 100;
    const x2pct = timeToLinear(species.end) * 100;
    const widthPct = Math.abs(x2pct - x1pct);
    const laneIdx = LANE_ASSIGNMENTS[species.id] ?? 2;
    const topPx = getLaneTop(laneIdx);

    const lane = document.createElement('div');
    lane.className = 'species-lane';
    lane.id = 'lane-' + species.id;
    lane.style.left = x1pct + '%';
    lane.style.width = widthPct + '%';
    lane.style.top = topPx + 'px';
    lane.style.background = species.color;
    lane.setAttribute('data-id', species.id);
    lane.title = species.name + ' (' + formatTime(species.start) + ' à ' + formatTime(species.end) + ')';

    // Inline label
    const lbl = document.createElement('span');
    lbl.className = 'species-lane-label';
    lbl.textContent = species.name.replace('Homo sapiens — ', 'H.s. ');
    lane.appendChild(lbl);

    lane.addEventListener('click', () => {
      const midTime = (species.start + species.end) / 2;
      setTime(midTime);
      selectSpecies(species);
    });
    lanesEl.appendChild(lane);
  });

  // --- Date ticks ---
  const keyTimes = [
    { t: -4100000, label: '4,1 Ma' },
    { t: -2400000, label: '2,4 Ma' },
    { t: -1800000, label: '1,8 Ma' },
    { t: -700000,  label: '700 ka' },
    { t: -400000,  label: '400 ka' },
    { t: -315000,  label: '315 ka' },
    { t: -100000,  label: '100 ka' },
    { t: -45000,   label: '45 ka' },
    { t: -14000,   label: '14 ka' },
    { t: -10000,   label: '10 ka' },
    { t: -5000,    label: '5 ka' },
    { t: -2000,    label: '2 ka' },
  ];
  keyTimes.forEach(kt => {
    const xpct = timeToLinear(kt.t) * 100;
    const tick = document.createElement('div');
    tick.className = 'tl-tick';
    tick.style.left = xpct + '%';
    tick.innerHTML = '<div class="tl-tick-line"></div><span class="tl-tick-text">' + kt.label + '</span>';
    tick.style.cursor = 'pointer';
    tick.addEventListener('click', () => setTime(kt.t));
    ticksRow.appendChild(tick);
  });

  // --- Skin band ---
  buildSkinBand();

  // --- Events band ---
  buildEventsBand();

  // --- Needle position init ---
  updateNeedlePosition();

  // --- Drag scrubber ---
  const scrubber = document.getElementById('timeline-scrubber');
  let isDragging = false;
  let startX, startLinear;

  function getTrackRef() {
    return document.getElementById('timeline-species-track');
  }

  const onMove = (e) => {
    if (!isDragging) return;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const trackRect = getTrackRef().getBoundingClientRect();
    const x = (clientX - trackRect.left) / trackRect.width;
    setTime(linearToTime(Math.max(0, Math.min(1, x))));
  };

  scrubber.addEventListener('mousedown', (e) => {
    isDragging = true;
    startX = e.clientX;
    startLinear = timeToLinear(currentTime);
    e.preventDefault();
  });
  scrubber.addEventListener('touchstart', (e) => {
    isDragging = true;
    startX = e.touches[0].clientX;
    startLinear = timeToLinear(currentTime);
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('mouseup', () => { isDragging = false; });
  document.addEventListener('touchend', () => { isDragging = false; });

  // Click anywhere on track to jump
  track.addEventListener('click', (e) => {
    if (e.target.closest('#timeline-scrubber')) return;
    const rect = getTrackRef().getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width;
    setTime(linearToTime(Math.max(0, Math.min(1, x))));
  });
}

  { start: -45000,   end: -11000,   color: '#4a2800', label: 'Paléo. sup. Eurasie : sombre (347/348 génomes)', tip: 'Chasseurs-cueilleurs eurasiens : peau sombre quasi-unanime jusqu\'à ~11 000 ans (PNAS 2025)' },

  { start: -10000,   end: -5000,    color: '#8a5030', label: 'Néolithique : transition intermédiaire', tip: 'SLC24A5 en diffusion ; Ötzi (5 300 ans) : peau sombre attestée par ADN' },
  { start: -5000,    end: -2000,    color: '#d4a878', label: 'Bronze/Fer Europe N : peau claire généralisée', tip: 'Migration Yamna + sélection → peau claire généralisée en Europe du Nord ~3 000 ans (PNAS 2025)' },
];

function buildSkinBand() {
  const track = document.getElementById('skin-band-track');
  if (!track) return;

  SKIN_PERIODS.forEach(seg => {
    const x1 = timeToLinear(seg.start) * 100;
    const x2 = timeToLinear(seg.end) * 100;
    const w = Math.abs(x2 - x1);
    const el = document.createElement('div');
    el.className = 'band-segment' + (seg.cssClass ? ' ' + seg.cssClass : '');
    el.style.left = x1 + '%';
    el.style.width = w + '%';
    el.style.background = seg.color;
    el.style.border = '1px solid rgba(255,255,255,0.12)';
    el.setAttribute('data-tip', seg.tip);
    el.title = seg.tip;
    // Fur icon indicator
    if (seg.cssClass === 'fur') {
      el.innerHTML = '<span style="font-size:9px;position:absolute;left:3px;top:50%;transform:translateY(-50%);opacity:0.7;pointer-events:none">🐒</span>';
    } else if (seg.cssClass === 'partial-fur') {
      el.innerHTML = '<span style="font-size:9px;position:absolute;left:3px;top:50%;transform:translateY(-50%);opacity:0.7;pointer-events:none">~🐒</span>';
    }
    track.appendChild(el);
  });
}

// =====================================================================
// EVENTS BAND (tools, fire, art, burial...)
// =====================================================================
function buildEventsBand() {
  const track = document.getElementById('events-band-track');
  if (!track) return;

  EVENTS_DATA.forEach(ev => {
    const xpct = timeToLinear(ev.time) * 100;
    const el = document.createElement('div');
    el.className = 'event-marker';
    el.style.left = xpct + '%';
    el.textContent = ev.icon;
    const catLabel = getCategoryLabel(ev.category);
    el.setAttribute('data-tip', '[' + catLabel + '] ' + ev.label + ' : ' + ev.desc.split('.')[0]);
    el.title = ev.label;
    el.addEventListener('click', () => {
      setTime(ev.time);
    });
    track.appendChild(el);
  });
}

function updateNeedlePosition() {
  const fullNeedle = document.getElementById('timeline-full-needle');
  if (!fullNeedle) return;
  const xpct = timeToLinear(currentTime) * 100;

  // The band tracks are offset by the label column (54px).
  // The species-track has NO label offset. To align the needle with both:
  // we place it relative to needle-wrapper which starts at the left edge.
  // Species track is full-width, band tracks have 54px label.
  // We use the species track as the reference (full-width).
  const wrapper = document.getElementById('needle-wrapper');
  if (!wrapper) return;
  const wrapperW = wrapper.getBoundingClientRect().width;
  const speciesTrackEl = document.getElementById('timeline-species-track');
  const speciesTrackRect = speciesTrackEl ? speciesTrackEl.getBoundingClientRect() : null;
  const wrapperRect = wrapper.getBoundingClientRect();

  // Use the species track width as the timeline width reference
  const trackLeft = speciesTrackRect ? (speciesTrackRect.left - wrapperRect.left) : 0;
  const trackWidth = speciesTrackRect ? speciesTrackRect.width : wrapperW;

  const px = trackLeft + xpct / 100 * trackWidth;
  fullNeedle.style.left = Math.max(0, Math.min(wrapperW - 1, px)) + 'px';
}

function setTime(time) {
  currentTime = Math.max(TIMELINE_MIN, Math.min(TIMELINE_MAX, time));
  document.getElementById('timeline-current-label').textContent = formatTime(currentTime);
  updateNeedlePosition();
  updateMap();

  // Highlight active species lanes
  document.querySelectorAll('.species-lane').forEach(lane => {
    const sp = SPECIES_DATA.find(s => s.id === lane.dataset.id);
    if (sp) {
      const isActive = sp.start <= currentTime && sp.end >= currentTime;
      lane.classList.toggle('active', isActive);
      lane.style.opacity = isActive ? '1' : '0.35';
    }
  });

  // Auto-select species if only one visible
  const visible = getVisibleSpecies();
  if (visible.length === 1 && (!selectedSpecies || !visible.includes(selectedSpecies))) {
    selectSpecies(visible[0]);
  }
}

function initLayerToggles() {
  document.querySelectorAll('.layer-btn[data-layer]').forEach(btn => {
    btn.addEventListener('click', () => {
      const layer = btn.dataset.layer;
      if (layer === 'events') {
        showEvents = !showEvents;
        btn.classList.toggle('active', showEvents);
        updateEvents();
      } else {
        layerStates[layer] = !layerStates[layer];
        btn.classList.toggle('active', layerStates[layer]);
        updateMap();
      }
    });
  });
}

function initThemeToggle() {
  const btn = document.querySelector('[data-theme-toggle]');
  if (!btn) return;
  const root = document.documentElement;
  let theme = 'dark';

  btn.addEventListener('click', () => {
    theme = theme === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', theme);

    // Swap tile layer
    const layers = [];
    leafletMap.eachLayer(l => { if (l.options && l.options.attribution) layers.push(l); });

    if (theme === 'light') {
      btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`;
      layers.forEach(l => leafletMap.removeLayer(l));
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap contributors &copy; CARTO', subdomains: 'abcd', maxZoom: 20
      }).addTo(leafletMap);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
        subdomains: 'abcd', opacity: 0.5, maxZoom: 20
      }).addTo(leafletMap);
    } else {

// PLAY / AUTOPLAY
// =====================================================================
let playInterval = null;
let isPlaying = false;

// Speed map: log-scale steps per tick (in "log-time" fraction of total range)
// At speed×1 we want to traverse the full timeline in ~60 seconds at 30fps ≈ 1800 ticks
const PLAY_FPS = 30;
const PLAY_TOTAL_TICKS = 1800; // full sweep at speed ×1

function startPlay() {
  if (isPlaying) return;
  isPlaying = true;

  const btn = document.getElementById('play-btn');
  const icon = document.getElementById('play-icon');
  const lbl = document.getElementById('play-label');
  btn.classList.add('playing');
  icon.innerHTML = '<rect x="3" y="2" width="3" height="10"/><rect x="8" y="2" width="3" height="10"/>';
  lbl.textContent = 'Pause';

  // If at end, restart from beginning
  if (currentTime >= TIMELINE_MAX - 1000) setTime(TIMELINE_MIN);

  const speedEl = document.getElementById('play-speed');

  const tick = () => {
    const speed = parseFloat(speedEl ? speedEl.value : '1');
    // log-scale step
    const totalLogRange = 1; // 0..1
    const stepPerTick = (totalLogRange / PLAY_TOTAL_TICKS) * speed;
    const currentLinear = timeToLinear(currentTime);
    const newLinear = currentLinear + stepPerTick;

    if (newLinear >= 1) {
      setTime(TIMELINE_MAX);
      stopPlay();
      return;
    }
    setTime(linearToTime(newLinear));
  };

  playInterval = setInterval(tick, 1000 / PLAY_FPS);
}

function stopPlay() {
  if (!isPlaying) return;
  isPlaying = false;
  if (playInterval) clearInterval(playInterval);
  playInterval = null;

  const btn = document.getElementById('play-btn');
  const icon = document.getElementById('play-icon');
  const lbl = document.getElementById('play-label');
  btn.classList.remove('playing');
  icon.innerHTML = '<polygon points="3,1 13,7 3,13"/>';
  lbl.textContent = 'Play';
}

function togglePlay() {
  if (isPlaying) stopPlay();
  else startPlay();
}

// =====================================================================
// ANIMATED MIGRATION ARROWS (during play)
// =====================================================================
let animMigLayer = null;

function getBearing(from, to) {
  // Returns bearing angle in degrees for a CSS rotation
  const lat1 = from[0] * Math.PI / 180;
  const lat2 = to[0] * Math.PI / 180;
  const dLng = (to[1] - from[1]) * Math.PI / 180;
  const y = Math.sin(dLng) * Math.cos(lat2);
  const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLng);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

function updateAnimatedMigrations() {
  if (!animMigLayer) return;
  animMigLayer.clearLayers();
  if (!layerStates.migrations) return;

  const visible = getVisibleSpecies();
  visible.forEach(species => {
    species.migrations.forEach(mig => {
      // Animated line with moving dashes
      const line = L.polyline([mig.from, mig.to], {
        color: species.color,
        weight: isPlaying ? 4 : 2,
        opacity: isPlaying ? 0.9 : 0.55,
        className: isPlaying ? 'migration-animated' : '',
        dashArray: isPlaying ? null : '8 4',
      });
      line.bindTooltip('<span style="color:' + species.color + '">' + mig.label + '</span>', { direction: 'center' });
      animMigLayer.addLayer(line);

      // Multiple arrowheads along the path to show direction
      const numArrows = isPlaying ? 3 : 1;
      const bearing = getBearing(mig.from, mig.to);

      for (let i = 0; i < numArrows; i++) {
        const t = (i + 1) / (numArrows + 1);
        const lat = mig.from[0] + (mig.to[0] - mig.from[0]) * t;
        const lng = mig.from[1] + (mig.to[1] - mig.from[1]) * t;

        const arrowSize = isPlaying ? 16 : 12;
        const glow = isPlaying ? 'filter:drop-shadow(0 0 6px ' + species.color + ');' : '';

        const arrow = L.marker([lat, lng], {
          icon: L.divIcon({
            className: 'mig-arrow-head',
            html: '<div style="width:0;height:0;' +
                  'border-left:' + (arrowSize*0.5) + 'px solid transparent;' +
                  'border-right:' + (arrowSize*0.5) + 'px solid transparent;' +
                  'border-bottom:' + arrowSize + 'px solid ' + species.color + ';' +
                  'transform:rotate(' + bearing + 'deg);' +
                  'opacity:' + (isPlaying ? '0.95' : '0.6') + ';' +
                  glow + '"></div>',
            iconSize: [arrowSize, arrowSize],
            iconAnchor: [arrowSize/2, arrowSize/2],
          }),
          zIndexOffset: 300,
        });
        animMigLayer.addLayer(arrow);
      }

      // Endpoint dot
      const dot = L.circleMarker(mig.to, {
        radius: isPlaying ? 6 : 4,
        color: species.color,
        fillColor: species.color,
        fillOpacity: 0.85,
        weight: 1.5,
      });
      animMigLayer.addLayer(dot);
    });
  });
}

    playBtn.classList.remove('pulse');
    const hint = document.getElementById('welcome-hint');
    if (hint) { hint.classList.add('hidden'); setTimeout(() => hint.remove(), 700); }
  });

  // Show afarensis by default
  setTimeout(() => { selectSpecies(SPECIES_DATA[0]); }, 400);

  // UX: after 3s of idle, pulse the play button + show welcome hint
  // (research shows ~3s is when users start wondering what to do on a new data-viz page)
  let autoPlayTimer = setTimeout(() => {
    const btn = document.getElementById('play-btn');
    if (btn && !isPlaying) btn.classList.add('pulse');
  }, 3000);

  // Auto-dismiss welcome hint after 8s even if user does nothing
  setTimeout(() => {
    const hint = document.getElementById('welcome-hint');
    if (hint) { hint.classList.add('hidden'); setTimeout(() => { if(hint.parentNode) hint.remove(); }, 700); }
  }, 8000);

  // Remove pulse on any map/timeline interaction
  function dismissPulse() {
    const btn = document.getElementById('play-btn');
    if (btn) btn.classList.remove('pulse');
    clearTimeout(autoPlayTimer);
  }
  document.getElementById('needle-wrapper').addEventListener('click', dismissPulse, { once: true });
  document.getElementById('needle-wrapper').addEventListener('touchstart', dismissPulse, { once: true });
});

// =====================================================================
// APPLY TRANSLATIONS TO DOM
// =====================================================================
function applyTranslations() {
  const t = i18next.t.bind(i18next);
  const lng = i18next.language;

  // RTL support
  document.documentElement.dir = (lng === 'ar') ? 'rtl' : 'ltr';
  document.documentElement.lang = lng;

  // Logo subtitle
  const logoSub = document.querySelector('.logo-sub');
  if (logoSub) logoSub.textContent = t('ui.logoSub');

  // Header buttons
  const themeBtn = document.querySelector('[data-theme-toggle]');
  if (themeBtn) themeBtn.title = t('ui.toggleTheme');

  // Layer toggle buttons
  const layerBtns = document.querySelectorAll('[data-layer]');
  layerBtns.forEach(btn => {
    const layer = btn.getAttribute('data-layer');
    const map = { sites: 'ui.layerSites', migrations: 'ui.layerMigrations', range: 'ui.layerRange', events: 'ui.layerEvents' };
    if (map[layer]) {
      // Keep the SVG, update only the text node
      const svg = btn.querySelector('svg');
      btn.textContent = t(map[layer]);
      if (svg) btn.prepend(svg);
    }
  });

  // Timeline hint
  const hint = document.querySelector('.timeline-hint');
  if (hint) hint.textContent = t('ui.slideTimeline');

  // Skin band label
  const skinLabel = document.querySelector('#skin-band .timeline-band-label');
  if (skinLabel) skinLabel.textContent = t('ui.skinBand');

  // Events band label
  const evtLabel = document.querySelector('#events-band .timeline-band-label');
  if (evtLabel) evtLabel.textContent = t('ui.eventsBand');

  // Legend title
  const legTitle = document.querySelector('.map-legend-title');
  if (legTitle) legTitle.textContent = t('ui.legendTitle');

  // Play/Pause button label (only if not currently playing)
  const playLabel = document.getElementById('play-label');
  if (playLabel) {
    playLabel.textContent = (typeof isPlaying !== 'undefined' && isPlaying) ? t('ui.pause') : t('ui.play');
  }

  // Welcome hint (innerHTML to allow the <strong>)
  const wh = document.getElementById('welcome-hint');
  if (wh && !wh.classList.contains('hidden')) {
    wh.innerHTML = t('ui.welcomeHint');
  }

  // Empty state
  const esTitle = document.querySelector('.empty-state-title');
  if (esTitle) esTitle.textContent = t('ui.selectSpecies');
  const esDesc = document.querySelector('.empty-state-desc');
  if (esDesc) esDesc.textContent = t('ui.selectSpeciesDesc');

  // Update all data-i18n-title elements (title= attributes)
  document.querySelectorAll('[data-i18n-title]').forEach(el => {
    const key = el.getAttribute('data-i18n-title');
    el.title = t(key);
  });

  // Rebuild skin band and events band so data-tip tooltips are translated
  if (typeof buildSkinBand === 'function') {
    const skinTrack = document.getElementById('skin-band-track');
    if (skinTrack) { skinTrack.innerHTML = ''; buildSkinBand(); }
  }
  if (typeof buildEventsBand === 'function') {
    const evTrack = document.getElementById('events-band-track');
    if (evTrack) { evTrack.innerHTML = ''; buildEventsBand(); }
  }

  // Rebuild map events layer so category tooltips are translated
  if (typeof updateEvents === 'function' && typeof eventsLayer !== 'undefined' && eventsLayer) {
    eventsLayer.clearLayers();
    updateEvents();
  }

  // Re-render open species panel so detail labels update immediately
  if (typeof selectedSpecies !== 'undefined' && selectedSpecies) {
    renderPanel(selectedSpecies);
  }
}

// =====================================================================
// INIT
// =====================================================================
function getLangFromBrowser() {
  const raw = (navigator.language || navigator.languages && navigator.languages[0] || 'fr');
  return raw.split('-')[0].toLowerCase();
}

function initI18n() {
  const supported = Object.keys(TRANSLATIONS);
  let detected = getLangFromBrowser();
  if (!supported.includes(detected)) detected = 'fr';

  // Sync the selector
  const sel = document.getElementById('lang-select');
  if (sel) sel.value = detected;

  i18next
    .init({
      lng: detected,
      fallbackLng: 'fr',
      resources: TRANSLATIONS,
      interpolation: { escapeValue: false },
    })
    .then(() => {
      applyTranslations();
    });

  // Language selector change handler
  if (sel) {
    sel.addEventListener('change', function() {
      i18next.changeLanguage(this.value).then(applyTranslations);
      // Update play/pause labels reactively when language changes
      const playLabel = document.getElementById('play-label');
      if (playLabel) {
        playLabel.textContent = (typeof isPlaying !== 'undefined' && isPlaying)
          ? i18next.t('ui.pause') : i18next.t('ui.play');
      }
    });
  }
}

// Wait for DOM + Leaflet to be ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initI18n);
} else {
  // DOM already ready — still wait a tick so the app has initialised
  setTimeout(initI18n, 50);
}

// Patch stopPlay / startPlay to update label language-aware
window.addEventListener('load', function() {
  const origStop = window.stopPlay;
  const origStart = window.startPlay;
  if (origStop) {
    window.stopPlay = function() {
      origStop();
      const lbl = document.getElementById('play-label');
      if (lbl && i18next.isInitialized) lbl.textContent = i18next.t('ui.play');
    };
  }
  if (origStart) {
    window.startPlay = function() {
      origStart();
      const lbl = document.getElementById('play-label');
      if (lbl && i18next.isInitialized) lbl.textContent = i18next.t('ui.pause');
    };
  }
});

})();
